---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kara-dashboard
  namespace: kara
  labels:
    app: kara-dashboard
    app.kubernetes.io/name: kara-dashboard
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: kara
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kara-dashboard
  template:
    metadata:
      labels:
        app: kara-dashboard
        app.kubernetes.io/name: kara-dashboard
        app.kubernetes.io/component: dashboard
        app.kubernetes.io/part-of: kara
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: kara-dashboard
          image: kara/dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          env:
            - name: ANALYST_URL
              value: "http://analyst-agent:8082"
            - name: INVESTIGATOR_URL
              value: "http://investigator-agent:8081"
            - name: WATCHER_URL
              value: "http://watcher-agent:8080"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: kara-dashboard
  namespace: kara
  labels:
    app: kara-dashboard
    app.kubernetes.io/name: kara-dashboard
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: kara
spec:
  type: NodePort
  ports:
    - port: 8083
      targetPort: http
      protocol: TCP
      name: http
      nodePort: 30083
  selector:
    app: kara-dashboard
