---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyst-agent
  namespace: kara
  labels:
    app: analyst-agent
    app.kubernetes.io/name: analyst-agent
    app.kubernetes.io/component: analyst
    app.kubernetes.io/part-of: kara
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analyst-agent
  template:
    metadata:
      labels:
        app: analyst-agent
        app.kubernetes.io/name: analyst-agent
        app.kubernetes.io/component: analyst
        app.kubernetes.io/part-of: kara
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: analyst-agent
          image: kara/analyst-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: SERVICE_HOST
              value: "0.0.0.0"
            - name: SERVICE_PORT
              value: "8082"
            - name: STORAGE_PATH
              value: "/data/incidents"
            - name: LOG_LEVEL
              value: "INFO"
          volumeMounts:
            - name: data
              mountPath: /data/incidents
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: analyst-agent
  namespace: kara
  labels:
    app: analyst-agent
    app.kubernetes.io/name: analyst-agent
    app.kubernetes.io/component: analyst
    app.kubernetes.io/part-of: kara
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: analyst-agent
