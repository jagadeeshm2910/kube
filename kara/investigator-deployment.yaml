---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: investigator-agent
  namespace: kara
  labels:
    app: investigator-agent
    app.kubernetes.io/name: investigator-agent
    app.kubernetes.io/component: investigator
    app.kubernetes.io/part-of: kara
spec:
  replicas: 2
  selector:
    matchLabels:
      app: investigator-agent
  template:
    metadata:
      labels:
        app: investigator-agent
        app.kubernetes.io/name: investigator-agent
        app.kubernetes.io/component: investigator
        app.kubernetes.io/part-of: kara
    spec:
      serviceAccountName: investigator-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: investigator-agent
          image: kara/investigator-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: SERVICE_HOST
              value: "0.0.0.0"
            - name: SERVICE_PORT
              value: "8081"
            - name: K8S_IN_CLUSTER
              value: "true"
            - name: LOG_LEVEL
              value: "INFO"
            - name: ANALYST_URL
              value: "http://analyst-agent:8082"
            - name: ANALYST_TIMEOUT
              value: "10"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: investigator-agent
  namespace: kara
  labels:
    app: investigator-agent
    app.kubernetes.io/name: investigator-agent
    app.kubernetes.io/component: investigator
    app.kubernetes.io/part-of: kara
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: investigator-agent
