---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: watcher-agent
  namespace: kara
  labels:
    app.kubernetes.io/part-of: kara

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: investigator-agent
  namespace: kara
  labels:
    app.kubernetes.io/part-of: kara

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kara-watcher
  labels:
    app.kubernetes.io/part-of: kara
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kara-investigator
  labels:
    app.kubernetes.io/part-of: kara
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kara-watcher
  labels:
    app.kubernetes.io/part-of: kara
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kara-watcher
subjects:
  - kind: ServiceAccount
    name: watcher-agent
    namespace: kara

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kara-investigator
  labels:
    app.kubernetes.io/part-of: kara
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kara-investigator
subjects:
  - kind: ServiceAccount
    name: investigator-agent
    namespace: kara
